<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Business Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:fixed;
  top:60px;
  right:15px;
  background:#1e293b;
  width:180px;
  border-radius:10px;
  display:none;
  z-index:2000;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.menu div{
  padding:12px;
  cursor:pointer;
}

.menu div:hover{
  background:#334155;
}

/* CONTENT */
.container{
  padding:80px 15px 15px 15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>📊 AI Business</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div onclick="showPage('About', aboutText)">About</div>
  <div onclick="showPage('Policy', policyText)">Policy</div>
  <div onclick="showPage('Settings', settingsText)">Settings</div>
  <div onclick="logout()">Logout</div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <h3>Dashboard Overview</h3>
    <p>Total Leads: 0</p>
  </div>

  <div class="card" id="pageBox" style="display:none;"></div>

</div>

<script src="./app.js"></script>

</body>
</html>
